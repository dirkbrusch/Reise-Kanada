<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#a01e1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kanada 2026">
<title>Ostkanada 2026 – Reise-App</title>
<style>
  :root{
    --maple:#a01e1e; --maple-dk:#7c1414; --cream:#faf6ef; --ink:#23201d; --muted:#6f6757;
    --card:#ffffff; --line:#e7e0d4; --gold:#c8932a; --green:#2f6b4f; --blue:#1a73e8;
    --soft:#f2ece1; --soft2:#fffdf8; --shadow:0 1px 3px rgba(0,0,0,.08),0 6px 18px rgba(0,0,0,.06);
  }
  body[data-theme="dark"]{
    --cream:#161311; --ink:#efe9df; --muted:#a99e8d; --card:#221e1a; --line:#3a342c;
    --soft:#2b2620; --soft2:#262119; --shadow:0 1px 3px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--cream);color:var(--ink);line-height:1.45;-webkit-text-size-adjust:100%}
  header{position:relative;overflow:hidden;z-index:20;background:linear-gradient(135deg,var(--maple),var(--maple-dk));
    color:#fff;padding:14px 16px;box-shadow:var(--shadow)}
  header .headerbg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
  header::after{content:"";position:absolute;inset:0;z-index:0;
    background:linear-gradient(110deg,rgba(124,20,20,.95) 0%,rgba(124,20,20,.62) 40%,rgba(38,70,100,.40) 100%)}
  header .row,header .count,header .progress,header .progress-txt{position:relative;z-index:1}
  header .row{display:flex;align-items:flex-start;gap:8px}
  header .t{font-size:18px;font-weight:700;letter-spacing:.2px;flex:1}
  header .s{font-size:12.5px;opacity:.9;margin-top:2px}
  .iconbtn{background:rgba(255,255,255,.15);border:0;color:#fff;border-radius:10px;width:34px;height:34px;
    font-size:16px;cursor:pointer;flex:none}
  .count{margin-top:8px;font-size:12.5px;background:rgba(255,255,255,.14);border-radius:10px;padding:7px 10px;display:inline-block}
  .progress{margin-top:10px;height:8px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden}
  .progress > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .progress-txt{font-size:11px;opacity:.9;margin-top:4px}
  nav.tabs{position:sticky;top:0;z-index:15;display:flex;background:var(--card);border-bottom:1px solid var(--line);
    overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{flex:0 0 auto;border:0;background:none;padding:12px 13px;font-size:13px;font-weight:600;color:var(--muted);
    border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
  nav.tabs button.active{color:var(--maple);border-bottom-color:var(--maple)}
  .wrap{max-width:760px;margin:0 auto;padding:14px 12px 60px}
  .pane{display:none}.pane.show{display:block}
  /* Toolbar / Suche */
  .search{display:flex;gap:8px;margin-bottom:10px}
  .search input{flex:1;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;
    background:var(--card);color:var(--ink)}
  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:8px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;font-size:12px;border:1px solid var(--line);background:var(--card);color:var(--muted);
    border-radius:99px;padding:6px 11px;cursor:pointer}
  .chip.on{background:var(--maple);border-color:var(--maple);color:#fff}
  /* Etappen */
  .stage{margin:0 0 14px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
  .stage > .head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:var(--card)}
  .stage > .head .badge{background:var(--maple);color:#fff;font-size:12px;font-weight:700;border-radius:8px;
    min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;padding:0 6px;flex:none}
  .stage > .head h2{font-size:15.5px;margin:0}
  .stage > .head .sub{font-size:11.5px;color:var(--muted);font-weight:500;display:block;margin-top:1px}
  .stage > .head .cnt{font-size:11px;color:var(--muted);background:var(--soft);border-radius:8px;padding:3px 8px;flex:none}
  .stage > .head .chev{color:var(--muted);transition:transform .2s;flex:none}
  .stage.collapsed .chev{transform:rotate(-90deg)}
  .stage.collapsed .body{display:none}
  .hotel{font-size:12px;color:var(--green);background:rgba(47,107,79,.09);padding:8px 14px;border-top:1px dashed var(--line)}
  .booking{font-size:12.5px;background:rgba(26,115,232,.08);border:1px solid rgba(26,115,232,.25);border-radius:12px;padding:10px 12px;margin:10px 14px}
  .booking .bk{font-weight:700;color:var(--ink);font-size:13.5px}
  .booking .ad{color:var(--muted);margin-top:1px}
  .booking .mk{margin-top:6px;font-size:12px}
  .booking .mk a,.booking a.bmap{color:var(--blue);text-decoration:none}
  .booking .warn{color:#b5651d;margin-top:6px;font-size:11.5px}
  .flight{display:flex;gap:10px;align-items:center;background:rgba(160,30,30,.06);border:1px solid rgba(160,30,30,.2);border-radius:12px;padding:10px 12px;margin:8px 0}
  .flight .fno{font-weight:800;color:var(--maple);font-size:14px;white-space:nowrap}
  .flight .ftxt{font-size:12.5px}
  .transit{font-size:12.5px;background:rgba(124,92,191,.09);border:1px solid rgba(124,92,191,.25);border-radius:12px;padding:9px 12px;margin:8px 14px}
  .transit a{color:var(--blue);text-decoration:none}
  .parking{font-size:12.5px;background:rgba(47,107,79,.08);border:1px solid rgba(47,107,79,.22);border-radius:12px;padding:9px 12px;margin:8px 14px}
  .shopping{font-size:12.5px;background:rgba(199,62,120,.08);border:1px solid rgba(199,62,120,.28);border-radius:12px;padding:9px 12px;margin:8px 14px}
  .shopping ul{margin:5px 0 0;padding-left:18px}
  .shopping li{margin:2px 0}
  .shopping a{color:var(--blue);text-decoration:none}
  .extras{font-size:12.5px;background:var(--soft2);border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin:8px 14px}
  .extras .ex-sec{margin-top:9px}
  .extras .ex-sec:first-child{margin-top:0}
  .extras h5{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--maple);margin:0 0 3px;font-weight:800}
  .extras ul{margin:0;padding-left:18px}
  .extras li{margin:2px 0}
  .extras a{color:var(--blue);text-decoration:none}
  /* Tagesroute */
  .dayroute{background:linear-gradient(180deg,var(--soft2),var(--card));border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:12px;padding:11px 13px;margin:10px 0 6px}
  .dayroute .rt-head{font-size:13.5px}
  .dayroute .rt-mode{font-size:11.5px;color:var(--muted);font-weight:600;margin-left:4px}
  .dayroute .rt-lead{font-size:12.5px;color:var(--ink);margin:5px 0 9px;line-height:1.5}
  .rt-list{list-style:none;margin:0;padding:0}
  .rt-list li{display:flex;gap:9px;align-items:flex-start;padding:5px 0;font-size:13px;line-height:1.45}
  .rt-list li .rt-n{flex:none;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .rt-list li.rt-gem .rt-n{background:var(--gold)}
  .rt-list li.rt-gem b{color:#a5781f}
  .rt-d{color:var(--muted);font-size:12px}
  .rt-btn{display:inline-flex;align-items:center;gap:6px;margin-top:9px;background:var(--blue);color:#fff;text-decoration:none;font-weight:600;font-size:12.5px;padding:8px 12px;border-radius:10px}
  .rt-list li.rt-part{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--maple);padding:9px 0 1px}
  .rt-list li.rt-transfer{color:var(--muted);font-size:12px;gap:5px;padding:3px 0 4px 3px}
  .rt-list li.rt-transfer b{color:var(--ink)}
  /* Integrierter Tagesablauf */
  .pbadge{display:inline-block;font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:6px;margin-right:6px;vertical-align:middle;letter-spacing:.3px}
  .pbadge.must{background:var(--maple);color:#fff}
  .pbadge.gem{background:rgba(200,147,42,.2);color:#a8781f}
  body[data-theme="dark"] .pbadge.gem{color:#e0b552}
  .item.isgem{border-left:3px solid var(--gold)}
  .fseg{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--maple);margin:14px 0 3px;padding-top:9px;border-top:1px solid var(--line)}
  .fseg:first-of-type{border-top:0;padding-top:0;margin-top:4px}
  .ftr{color:var(--muted);font-size:12.5px;margin:5px 0 5px 8px;padding:2px 0 2px 8px;border-left:2px dashed var(--line)}
  .ftr b{color:var(--ink)}
  .ftr.fhome{border-left-color:var(--green);background:rgba(47,107,79,.06);border-radius:0 8px 8px 0}
  .dayflow{margin-top:6px}
  .tchip{display:inline-block;font-size:10px;font-weight:800;background:var(--soft);color:var(--ink);padding:1px 7px;border-radius:6px;margin-right:6px;vertical-align:middle;white-space:nowrap}
  .fnote{background:rgba(200,147,42,.12);border:1px solid rgba(200,147,42,.3);border-radius:11px;padding:9px 12px;margin:4px 0 8px;font-size:12.5px;line-height:1.55}
  .fnote b{color:var(--maple)}
  .stayh-links a.pricelink{color:#a01e1e;font-weight:600}
  .staysub{font-size:11px;font-weight:800;color:var(--maple);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 3px}
  .fewo-links{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  .fewo-links a{font-size:12px;text-decoration:none;border:1px solid rgba(160,30,30,.35);border-radius:9px;padding:6px 11px;color:var(--maple);background:rgba(160,30,30,.06);font-weight:600}
  .tour{border:1px solid var(--line);border-radius:12px;padding:8px 10px;margin:10px 0;background:var(--soft2)}
  .tourhd{font-size:13.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
  .tourhd .cnt2{font-size:10.5px;font-weight:600;color:var(--muted);background:var(--soft);border-radius:6px;padding:1px 7px}
  .tourbtns{display:flex;gap:7px;margin:7px 0 4px;flex-wrap:wrap}
  .tbtn{font-size:11.5px;border:1px solid var(--line);background:var(--card);color:var(--maple);border-radius:9px;padding:5px 10px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
  .tbtn.gpx{color:var(--green)}
  .pill.web{color:var(--green)}
  .drive{font-size:12.5px;color:#8a5a16;background:rgba(200,147,42,.12);padding:9px 14px;border-radius:12px;margin:10px 0;border:1px solid rgba(200,147,42,.3)}
  .day{padding:8px 14px 14px;border-top:1px solid var(--line)}
  .day h3{font-size:13.5px;margin:12px 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .day h3 .dt{background:var(--soft);color:var(--ink);font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;white-space:nowrap}
  .item{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .item:last-child{border-bottom:0}
  .item .ico{font-size:17px;width:22px;text-align:center;flex:none;line-height:1.5}
  .item .main{flex:1;min-width:0}
  .item .nm{font-size:14px;font-weight:600}
  .item .nt{font-size:12.5px;color:var(--muted);margin-top:1px}
  .item .acts{display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap}
  .item.done .nm{text-decoration:line-through;color:var(--muted)}
  .pill{font-size:11px;text-decoration:none;border:1px solid var(--line);border-radius:99px;padding:3px 9px;color:var(--maple);
    background:var(--card);display:inline-flex;align-items:center;gap:4px;cursor:pointer}
  .pill.map{color:var(--blue)}
  .src{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:700;letter-spacing:.3px}
  .src.v{background:rgba(47,107,79,.14);color:#3f8f6a} .src.n{background:rgba(52,93,171,.14);color:#6b8fd4} .src.c{background:rgba(169,119,42,.16);color:#bd8c3f}
  .cb{width:20px;height:20px;accent-color:var(--green);flex:none;margin-top:2px;cursor:pointer}
  .star{font-size:18px;cursor:pointer;line-height:1;background:none;border:0;padding:0;color:#c9bdab}
  .star.on{color:var(--gold)}
  .note{width:100%;margin-top:6px;font-size:12.5px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;display:none;
    font-family:inherit;resize:vertical;background:var(--soft2);color:var(--ink)}
  .note.show{display:block}
  /* Item-Politur + Hintergrund-Info */
  .item{border-radius:10px;padding:10px 8px;transition:background .15s}
  .item:hover{background:var(--soft2)}
  .item .nm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .nm.hasinfo{cursor:pointer}
  .nm .infochev{color:var(--maple);font-weight:800;font-size:13px;transition:transform .2s;line-height:1}
  .item.openinfo .nm .infochev{transform:rotate(90deg)}
  .acts{gap:7px}
  .pill{padding:4px 10px;transition:background .15s,border-color .15s}
  .pill:hover{background:var(--soft)}
  .pill.infoBtn{color:var(--maple);border-color:rgba(160,30,30,.35);background:rgba(160,30,30,.07);font-weight:600}
  .pill.infoBtn:hover{background:rgba(160,30,30,.13)}
  .infopanel{display:none;margin-top:9px;background:var(--soft2);border:1px solid var(--line);
    border-left:3px solid var(--gold);border-radius:11px;padding:11px 13px;font-size:13px;color:var(--ink);
    animation:fadein .18s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
  .item.openinfo .infopanel{display:block}
  .infopanel p{margin:0 0 7px;line-height:1.55}
  .infopanel p:last-child{margin-bottom:0}
  .infopanel .tip{background:rgba(200,147,42,.13);border-radius:9px;padding:7px 10px;font-size:12.5px;margin-top:4px;line-height:1.5}
  .infopanel .ilink{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font-size:12.5px;
    color:var(--blue);text-decoration:none;font-weight:600}
  .infopanel .ilink:hover{text-decoration:underline}
  .ev .ilink{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--blue);
    text-decoration:none;font-weight:600;margin-top:5px;margin-right:8px}
  .ev .ilink:hover{text-decoration:underline}
  /* Tour-Inhalte (Insider-Block je Tag) */
  .tourx{margin:12px 0 4px;background:linear-gradient(180deg,var(--soft2),var(--card));border:1px solid var(--line);border-radius:14px;padding:12px 13px}
  .tourx .tx-lead{font-size:13px;line-height:1.55;color:var(--ink);font-style:italic;margin-bottom:6px;padding-left:10px;border-left:3px solid var(--gold)}
  .tourx .tx-sec{margin-top:12px}
  .tourx .tx-sec h5{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--maple);margin:0 0 5px;font-weight:800}
  .tx-item{padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.5}
  .tx-item:last-child{border-bottom:0}
  .tx-item .txn{font-weight:700}
  .tx-item .txd{color:var(--muted)}
  .tx-item .txl{white-space:nowrap}
  .tx-item .txl a{text-decoration:none;font-size:13px;margin-left:2px}
  .tourx .tx-night{margin-top:11px;background:rgba(38,70,100,.08);border:1px solid rgba(38,70,100,.18);border-radius:10px;padding:9px 11px;font-size:12.5px;line-height:1.55}
  .tourx .tx-night b{color:var(--maple)}
  /* Schlechtwetter- / Entspannen-Buttons */
  .modes{display:flex;gap:8px;margin:10px 14px 2px;flex-wrap:wrap}
  .modes.modes--flush{margin:10px 0 2px}
  .mode{flex:1;min-width:150px}
  .modebtn{width:100%;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:11px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink)}
  .modebtn.rainbtn{background:rgba(38,70,100,.09);border-color:rgba(38,70,100,.28);color:#2a5673}
  .modebtn.relaxbtn{background:rgba(47,107,79,.09);border-color:rgba(47,107,79,.28);color:#2f6b4f}
  body[data-theme="dark"] .modebtn.rainbtn{color:#8fb6d6}
  body[data-theme="dark"] .modebtn.relaxbtn{color:#7fc4a1}
  .mode .modepanel{display:none;margin-top:7px;background:var(--soft2);border:1px solid var(--line);border-radius:11px;padding:8px 12px}
  .mode.open .modepanel{display:block;animation:fadein .18s ease}
  .mode .mp-hint{font-size:11.5px;color:var(--muted);margin-bottom:3px;font-weight:600}
  /* Reisebericht */
  .story{max-width:720px;margin:0 auto}
  .story-hero{position:relative;overflow:hidden;background:var(--maple-dk);color:#fff;border-radius:18px;padding:20px 18px;margin-bottom:18px;box-shadow:var(--shadow)}
  .story-hero .herobg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
  .story-hero::after{content:"";position:absolute;inset:0;z-index:0;background:linear-gradient(120deg,rgba(124,20,20,.9) 0%,rgba(60,16,16,.66) 70%,rgba(38,70,100,.42) 100%)}
  .story-hero>*{position:relative;z-index:1}
  .story-hero .sh-kicker{font-size:11.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;opacity:.92}
  .story-hero .sh-title{font-size:23px;font-weight:800;margin-top:4px;text-shadow:0 1px 7px rgba(0,0,0,.45)}
  .story-hero .sh-sub{font-size:12.5px;opacity:.95;margin-top:6px;line-height:1.45;text-shadow:0 1px 5px rgba(0,0,0,.4)}
  .story-hero .sh-lead{font-size:14px;line-height:1.6;margin-top:12px;text-shadow:0 1px 5px rgba(0,0,0,.35)}
  .story-hero .btn{margin-top:14px;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.35)}
  .story-stage{margin:0 0 20px}
  .story-stage>h2{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:17px;margin:0 0 12px;padding-bottom:8px;border-bottom:2px solid var(--line)}
  .story-stage>h2 .ss-badge{background:var(--maple);color:#fff;width:26px;height:26px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex:none}
  .story-stage>h2 .ss-dates{font-size:11.5px;font-weight:500;color:var(--muted)}
  .story-day{margin:0 0 13px;padding-left:14px;border-left:3px solid var(--gold)}
  .story-day .sd-head{font-size:14px;margin-bottom:3px}
  .story-day .sd-tag{background:var(--soft);color:var(--ink);font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px}
  .story-day .sd-date{color:var(--muted);font-size:12px;font-weight:600;margin:0 5px}
  .story-day p{font-size:13.5px;line-height:1.6;color:var(--ink);margin:3px 0 0}
  .story-drive{margin:0 0 16px;background:var(--soft2);border:1px dashed var(--line);border-radius:10px;padding:9px 12px}
  .story-drive b{color:var(--ink)}
  .story-drive .sd-sub{font-size:11.5px;color:var(--muted)}
  .story-drive p{font-size:13px;line-height:1.55;color:var(--ink);margin:5px 0 0}
  .story-foot{text-align:center;font-size:11.5px;color:var(--muted);margin:6px 0 0;padding-top:14px;border-top:1px solid var(--line)}
  /* Events */
  .ev{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);align-items:flex-start}
  .ev .date{flex:none;text-align:center;background:var(--maple);color:#fff;border-radius:10px;padding:6px 8px;min-width:52px}
  .ev .date .d{font-size:17px;font-weight:800;line-height:1} .ev .date .m{font-size:10px;text-transform:uppercase;opacity:.9}
  .ev .nm{font-size:14px;font-weight:600} .ev .meta{font-size:12px;color:var(--muted);margin-top:2px}
  .ev .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:6px;margin-top:5px}

     lead:'Realistischer Ankunftstag: Landung ~16:00, Einreise/Gepäck, Transfer ins Hotel, Check-in und kurzer Einkauf – danach entspannt in Hotelnähe essen. Bewusst kein Abendprogramm; die Altstadt-Highlights kommen ab morgen.'},
    items:[
     I('Check-in Embassy Suites by Hilton','hotel','208 Saint-Antoine Ouest · All-Suite mit Küchenzeile','Embassy Suites by Hilton Montreal 208 Saint-Antoine Ouest','v','',{time:'~17:30',noroute:true,info:{d:'All-Suite-Hotel am Rand von Vieux-Montréal (nah an Chinatown und Palais des congrès). Jede Suite hat eine Küchenzeile – praktisch für Selbstverpflegung – und ein warmes Frühstück ist inklusive.',t:'Bei Hilton-Honors-Status nach Upgrade/Late-Check-out fragen.'}}),
     I('Kurz-Einkauf: IGA Complexe Desjardins','market','Wasser, Frühstück, Kleinigkeiten für die Suite · ~10 Min','IGA Complexe Desjardins Montreal','v','',{time:'~18:15',info:{d:'Großer Supermarkt im Complexe Desjardins, teils trocken über die Untergrundstadt (RÉSO) erreichbar. Ideal, um die Suite mit Wasser, Frühstückssnacks und Kleinigkeiten zu bestücken.',t:'Bei Regen die unterirdische Verbindung nutzen.'}}),
     I('Quartier chinois (Chinatown)','food','schnelle, authentische Nudeln & Dumplings · ~5 Min','Quartier chinois Montréal','v','',{info:{d:'Montréals Chinatown rund um die Fußgängerzone Rue de la Gauchetière mit ihren Torbögen, nur wenige Minuten vom Hotel. Schnelle, ehrliche Nudeln, Dumplings und Bubble Tea – perfekt für einen müden Ankunftsabend.',t:'Für Dumplings z. B. Mai Xiang Yuan; meist ohne Reservierung.'}}),
     I('Le Cartet','food','Bistro & Feinkost, Québecer Produkte · ~7 Min','Le Cartet Montréal','v','https://lecartet.com',{noroute:true,info:{d:'Beliebtes Bistro und Feinkostladen in einem hohen Backsteinraum (106 rue McGill) – bekannt für Brunch, abends aber auch unkomplizierte, gute Küche mit lokalen Produkten.',t:'Abends deutlich ruhiger als zur Brunch-Zeit.'}}),
     I('Bevo Bar + Pizzeria','food','neapolitanische Holzofen-Pizza · ~8 Min','Bevo Bar Pizzeria Montréal','v','',{noroute:true,info:{d:'Lebhafte Pizzeria/Bar in Vieux-Montréal mit neapolitanischer Holzofen-Pizza – locker und unkompliziert für einen entspannten ersten Abend.',t:'Terrasse an der Rue Saint-Vincent bei gutem Wetter.'}})],
    flow:[
     {seg:'🛬 Ankunft · Fr 31.07., Landung ~16:00'},
     {tr:'🛬 Flughafen YUL: Einreise & Gepäck ~45–60 Min. Zum Hotel (Embassy Suites, 208 Saint-Antoine O.): 🚗 Uber ~40–45 CAD oder Taxi zum Festpreis ~48 CAD (~30 Min). Budget-Alternative: Bus 747 (24-h-Pass 11,25 CAD, direkt am Terminal) bis Square-Victoria–OACI, dann ~4 Min zu Fuß.'},
     0,1,
     {seg:'🌆 Abend · nahe Hotel (entspannt, kein Programm)'},
     {note:'💡 Bewusst ruhiger Ankunftsabend: nur Abendessen in Hotelnähe (alles fußläufig), danach ins Hotel. Meine Reihenfolge für den müden Abend: 1) Quartier chinois (schnell & authentisch, ~5 Min) · 2) Le Cartet (Bistro, ~7 Min) · 3) Bevo (Pizza, ~8 Min). Vieux-Port, Place Jacques-Cartier & Cité Mémoire heben wir uns für die Folgetage auf (Cité Mémoire Fr–So abends – gut am Sa/So).'},
     2,3,4,
     {home:'alle drei Lokale ~5–10 Min zu Fuß zurück zum Embassy Suites – am Ankunftsabend ideal.'}
    ]},
   {iso:'2026-08-01',dt:'Sa 01.08.',title:'Hub: Vieux-Montréal',
    route:{walk:true,mode:'🚶 zu Fuß + Metro · ganzer Tag',
     lead:'Ein durchgehender Weg ab Hotel: erst die Altstadt zu Fuß (die 💎-Perlen liegen direkt am Weg), dann per Metro an den Lachine-Kanal, abends zurück zum Abendessen in der Altstadt. Reihenfolge = Laufreihenfolge; Uhrzeiten sind entspannte Richtwerte.'},
    items:[
     I('Basilique Notre-Dame','sight','~5 Min vom Hotel · morgens am ruhigsten','Basilique Notre-Dame Montréal','v','https://www.basiliquenotredame.ca',{must:true,time:'9:30',info:{d:'Neugotisches Meisterwerk von 1829 mit tiefblau bemaltem Gewölbe, tausenden Blattgold-Sternen und einer der größten Casavant-Orgeln Nordamerikas. Der Innenraum ist bewusst wie ein Sternenhimmel gestaltet – ganz anders als das schlichte Äußere vermuten lässt.',t:'Eintritt kostenpflichtig; die abendliche Licht-Show „AURA" ist ein separates Ticket. Früh kommen, bevor die Reisegruppen eintreffen.'}}),
     I('Cours Le Royer','sight','stiller Innenhof · ~3 Min','Cours Le Royer Montréal','v','',{gem:true,time:'10:15',info:{d:'Autofreier, begrünter Innenhof zwischen ehemaligen Textil-Lagerhäusern des 19. Jahrhunderts, heute Wohn- und Büro-Lofts. Einer der stillsten Winkel der Altstadt – die meisten Touristen laufen an der Zufahrt vorbei.',t:'Perfekte kurze Pause abseits des Trubels der Rue Saint-Paul.'}}),
     I('Chapelle Notre-Dame-de-Bon-Secours','sight','Turmaufstieg, Hafenblick · ~5 Min','Chapelle Notre-Dame-de-Bon-Secours Montréal','v','https://margueritebourgeoys.org',{gem:true,time:'10:30',info:{d:'Die „Seefahrer-Kapelle" von 1771, gegründet von Marguerite Bourgeoys. Von Matrosen gestiftete hölzerne Votiv-Schiffe hängen unter der Decke; eine schmale Treppe führt hinauf auf den Turm.',t:'Turm & Aussichtsplattform gegen kleinen Eintritt – einer der schönsten Hafenblicke der Altstadt.'}}),
     I('Marché Bonsecours','shop','Kunsthandwerk-Markthalle · ~2 Min','Marché Bonsecours Montréal','v','https://marchebonsecours.qc.ca',{gem:true,time:'11:00',info:{d:'Klassizistischer Markthallenbau von 1847 mit silberner Kuppel – einst Parlament und Rathaus. Heute lokale Boutiquen, Kunsthandwerk und Designer aus Québec statt Souvenir-Kitsch.',t:'Gute Adresse für ehrliche Mitbringsel.'}}),
     I('Tour de l\'Horloge','view','Aussicht & Stadtstrand · ~6 Min','Tour de l\'Horloge Montréal','v','',{gem:true,time:'11:30',info:{d:'1922 als Denkmal für gefallene Matrosen errichteter Uhrturm am Quai de l\'Horloge. 192 Stufen führen zu einer kostenlosen Aussichtsplattform; davor liegt ein städtischer Sandstrand direkt am Fluss.',t:'Aufstieg gratis – toller Rundblick über Hafen und Skyline.'}}),
     I('Bota Bota','spa','Spa-Schiff (optional) · reservieren','Bota Bota Montréal','c','https://botabota.ca',{time:'12:15',info:{d:'Nordisches Spa auf einer umgebauten Fähre im Alten Hafen: Warm- und Kaltbecken, Saunen und Ruhedecks mit Blick auf den Sankt-Lorenz-Strom. Ideal, um nach dem Altstadt-Rundgang runterzukommen.',t:'Vorab reservieren, Badesachen mitnehmen; der reine „Wasserkreislauf" ohne Massage ist günstiger.'}}),
     I('Marché Atwater','market','Satay Brothers · Picknick am Kanal','Marché Atwater Montréal','v','https://www.marchespublics-mtl.com',{must:true,time:'13:30',info:{d:'Art-déco-Markthalle von 1933 mit markantem Uhrturm am Lachine-Kanal: Metzger, Käsehändler, Bäcker und Feinkost unter einem Dach. Der Stand „Satay Brothers" ist Kult für südostasiatisches Streetfood.',t:'Alles fürs Picknick am Kanal besorgen; bei Sonne ein Leihrad (BIXI) oder Spaziergang am Wasser.'}}),
     I('Garde Manger','food','Seafood ohne Türschild · reservieren','Garde Manger Montréal','c','',{info:{d:'Chuck Hughes\' berühmtes Seafood-Lokal in Vieux-Montréal – ohne Schild an der Tür, eng, laut und lebendig. Austern, Hummer-Poutine und tagesfrische Meeresfrüchte in echter Bistro-Atmosphäre.',t:'Nur mit Reservierung; sehr klein und immer voll.'}}),
     I('Modavie','food','Lammküche + Live-Jazz jeden Abend','Modavie Montréal','c','https://www.modavie.com',{noroute:true,info:{d:'Vieux-Montréal-Institution an der Ecke Saint-Paul/Saint-Vincent mit Fokus auf Lammgerichten und Québecer Produkten – dazu Live-Jazz an jedem Abend ohne Aufpreis.',t:'Früh reservieren, um zu den Jazz-Sets gut zu sitzen.'}}),
     I('Le Serpent','food','kreative Bistronomie in alter Gießerei','Le Serpent Montréal','c','https://leserpent.ca',{noroute:true,info:{d:'Marktfrische, italienisch inspirierte Bistronomie in der ehemaligen Fonderie Darling (Griffintown): klare, kreative Teller in stylisch-industriellem Raum.',t:'Etwas außerhalb der Altstadt, aber ein lohnender kurzer Weg.'}}),
     I("L'Express",'food','klassische Pariser Brasserie (Plateau)','L\'Express Montréal','c','https://restaurantlexpress.com',{noroute:true,info:{d:'Seit 1980 die Pariser-Stil-Brasserie schlechthin auf der Rue Saint-Denis im Plateau: Steak frites, Knochenmark, das Cornichon-Glas gratis auf dem Tisch. Zeitlos und immer voll.',t:'Reservieren; lohnt die Metrofahrt ins Plateau, wenn du klassische Brasserie willst.'}}),
     I('Olive + Gourmando','bakery','Kult-Bäckerei · Sauerteig, Zimtschnecken · kleine Kaffeepause','Olive et Gourmando Montréal','v','https://www.oliveetgourmando.com',{time:'10:00',info:{d:'Bäckerei-Café in Vieux-Montréal (350 Rue Saint-Paul O.), seit 1997 eine Institution: berühmt für Sauerteigbrote, warme Zimtschnecken und üppige Sandwiches. Vormittags voll mit Locals – genau das richtige „Foodie-Frühstück" statt Hotelbuffet.',t:'Nur tagsüber, Di–Sa; früh dran sein, sonst Schlange.'}}),
     I('Les Sœurs Grises','beer','Brauerei-Gasthaus · eigene Fassbiere · Apéro vor dem Dinner','Les Sœurs Grises Montréal','v','',{time:'17:30',info:{d:'Handwerks-Brauerei-Gasthaus in Vieux-Montréal (32 Rue McGill) mit eigenen Bieren direkt vom Fass und geräucherten Spezialitäten. Ein entspannter Tap-Room für einen Apéro, bevor es zum Abendessen geht.',t:'Bei gutem Wetter Terrasse; unbedingt die eigenen Fassbiere probieren.'}}),
     I('Cité Mémoire','sight','Gratis-Videoprojektionen in den Altstadt-Gassen (Fr–So abends)','Cité Mémoire Montréal','v','https://www.montrealenhistoires.com',{gem:true,noroute:true,info:{d:'Eine der größten Outdoor-Videoprojektionen der Welt: nach Einbruch der Dunkelheit erscheinen Szenen aus Montréals Geschichte an den Hauswänden der Altstadt. Ein stimmungsvoller, kostenloser Abschluss direkt beim Hotel.',t:'Nur Fr–So nach Dunkelheit; die App „Montréal en Histoires" liefert Ton und Erklärungen.'}})],

     {home:'aus Vieux-Montréal (Garde Manger / Modavie / Le Serpent) ~5–12 Min zu Fuß zurück zum Embassy Suites (208 Saint-Antoine O.). Vom L\'Express (Plateau): 🚇 Metro Sherbrooke (Linie Orange, Richtung Côte-Vertu), 4 Stationen bis Square-Victoria–OACI, dann ~4 Min zu Fuß – oder 🚗 Uber ~13–16 CAD (~12 Min).'}
    ]},
   {iso:'2026-08-02',dt:'So 02.08.',title:'Mont-Royal & Mile End',
    route:{walk:true,mode:'🚶 Metro + zu Fuß · ganzer Tag',
     lead:'Vormittags auf den Mont-Royal (Aussicht + ruhige Waldpfade), sonntags die Tam-Tams; nachmittags ins kreative Mile End – Bagels, Perlen, Plattenläden, Tap-Room. Reihenfolge = Laufreihenfolge; Uhrzeiten sind Richtwerte.'},
    items:[
     I('Kondiaronk-Belvédère','view','klassischer Skyline-Blick am Chalet du Mont-Royal','Kondiaronk Belvedere Montréal','v','',{must:true,time:'10:00',info:{d:'Die große Aussichtsterrasse am Chalet du Mont-Royal mit dem klassischen Postkartenblick über Downtown und den Strom. Der Berg wurde vom Central-Park-Architekten Frederick Law Olmsted gestaltet.',t:'Morgens bestes Licht und noch leer.'}}),
     I('Mont-Royal Summit Loop & Croix','nature','ruhige Waldpfade zur Croix · ~30–40 Min','Mont Royal summit loop trail','v','',{gem:true,time:'10:45',info:{d:'Ruhige Waldpfade vom Belvédère hinauf zur Croix du Mont-Royal und zu versteckten Aussichten – wenig Touristen, viel Grün. Die beleuchtete Croix ist nachts weithin sichtbar.',t:'Feste Schuhe reichen; Schleife ~30–40 Min.'}}),
     I('Lac aux Castors & Maison Smith','nature','kleiner See mit Pavillon-Café · Rastpunkt','Lac aux Castors Montréal','v','',{time:'11:30',info:{d:'Kleiner See im Bergpark mit Pavillon (Maison Smith) und Skulpturenwiese – ein schöner Rastpunkt mit Café. Im Sommer Tretboote.',t:'Kaffee/Snack im Pavillon Maison Smith.'}}),
     I('Tam-Tams du Mont-Royal','sight','sonntags: Trommelkreis am Cartier-Denkmal','Tam-Tams Mont-Royal Montréal','v','https://www.lemontroyal.qc.ca',{time:'12:30',info:{d:'Sonntäglicher, frei zugänglicher Trommelkreis am Fuß des Bergs rund um das George-Étienne-Cartier-Denkmal, dazu Picknick, Jongleure und ein kleiner Kunsthandwerksmarkt. Eine der lebendigsten Montréaler Traditionen.',t:'Nur sonntags ab ~Mittag bei gutem Wetter; Picknickdecke mitbringen.'}}),
     I('St-Viateur & Fairmount Bagel','bakery','die ewige Bagel-Debatte · warm aus dem Holzofen','St-Viateur Bagel Montréal','v','https://stviateurbagel.com',{must:true,time:'13:45',info:{d:'Die zwei legendären Bagel-Bäckereien des Mile End backen im Holzofen die typischen Montréal-Bagels – dünner, etwas süßer, sesamreicher als New Yorker. St-Viateur (seit 1957) und Fairmount (seit 1919) liegen nur Minuten auseinander.',t:'Beide vergleichen gehört zum Pflichtprogramm; warm essen.'}}),
     I('La Drogheria Fine','food','Gnocchi am Walk-up-Fenster · wenige Dollar','La Drogheria Fine Montréal','v','',{gem:true,time:'14:15',noroute:true,info:{d:'Winziges Walk-up-Fenster auf der Fairmount: hausgemachte Gnocchi mit „salsa della nonna" für wenige Dollar – Kult unter Locals.',t:'Nur zum Mitnehmen; ideal als kleine Zwischenmahlzeit.'}}),
     I('Librairie Drawn & Quarterly','shop','Kult-Indie-Buch- & Comicladen','Drawn and Quarterly Montréal','v','https://drawnandquarterly.com',{gem:true,time:'14:35',noroute:true,info:{d:'Legendärer Indie-Comic- und Buchladen, Herz der Mile-End-Literaturszene, oft mit Lesungen. Schön kuratiert zum Stöbern.',t:'Nebenan der Kinder-Ableger „La Petite Librairie".'}}),
     I('Le Champ des Possibles','nature','wilde Stadtwiese hinter den Gleisen','Champ des Possibles Montréal','v','',{gem:true,time:'15:00',info:{d:'Wilde, von Anwohnern zurückeroberte Stadtwiese hinter den Bahngleisen – Wildblumen, Bienen, Street-Art und kaum ein Tourist. Ein Stück ungezähmtes Montréal mitten im Viertel.',t:'Ruhiger Durchatem-Stopp zwischen den Genuss-Stationen.'}}),
     I('Mile End Läden & Plattenläden','shop','Platten, Boutiquen, Galerien · Saint-Viateur/Bernard','Mile End Montréal','v','',{time:'15:30',noroute:true,info:{d:'Das Kreativviertel schlechthin: unabhängige Platten- und Buchläden, Designboutiquen, Galerien und Cafés entlang Saint-Viateur und Bernard.',t:'Perfekt zum planlosen Bummeln.'}}),
     I('Café Olimpico','cafe','italienischer Espresso seit 1970 · immer voll','Café Olimpico Montréal','v','https://cafeolimpico.com',{time:'16:00',noroute:true,info:{d:'Italienisches Kaffee-Urgestein im Mile End seit 1970, immer voll mit Einheimischen – ernsthafter Espresso ohne Schnickschnack.',t:'Draußen an der Ecke mit den Locals stehen.'}}),
     I('Kem CoBa','food','artisanale Eisdiele · berühmte Soft-Twist-Sorbets','Kem CoBa Montréal','v','',{time:'16:30',noroute:true,info:{d:'Artisanale Eisdiele mit berühmten „soft-twist"-Sorbets in ausgefallenen Kombinationen – meist Schlange, aber jeden Cent wert.',t:'Nach saisonalen Sorten fragen.'}}),
     I('Dieu du Ciel!','beer','Kult-Brauerei (29 Laurier O.) · Apéro','Dieu du Ciel Montréal','v','https://dieuduciel.com',{time:'17:30',info:{d:'Weltbekannte Brauerei-Gaststätte; Biere wie der Kaffee-Stout „Péché Mortel" haben Kultstatus. Klein, voll und sehr lokal.',t:'Früh kommen für einen Platz; toller Tap-Room-Apéro vor dem Dinner.'}}),
     I('Lawrence','food','Mile-End-Klassiker · Nose-to-tail-Marktküche','Lawrence Restaurant Montréal','c','https://lawrencerestaurant.com',{info:{d:'Mile-End-Klassiker mit Nose-to-tail-Marktküche, hauseigener Charcuterie und ganzen Tieren vom Bauernhof – britisch-mediterran inspiriert.',t:'Reservieren.'}}),
     I('Beau Temps','food','Naturwein-Bar · geteilte Teller','Beau Temps Montréal','c','',{noroute:true,info:{d:'Naturwein-Bar/Restaurant mit geteilten Tellern (Geflügelleber-Mousse, Lamm-Tatar) zu fairen Preisen – locker und stimmungsvoll.',t:'Gut für einen ungezwungenen Abend.'}}),
     I("Larry's",'food','lockeres Bistro der Lawrence-Crew','Larrys Montréal','c','',{noroute:true,info:{d:'Lockeres Mile-End-Bistro der Lawrence-Crew – kreative kleine Teller und hervorragende Naturweine, den ganzen Tag geöffnet.',t:'Auch spontan einen Versuch wert.'}})],
    flow:[

     {tr:'~20 Min zu Fuß nordöstlich vom Berg hinunter ins Mile End (Rue Saint-Viateur) – oder Bus 11 + kurzer Fußweg.'},

     4,5,6,7,8,9,10,

     {seg:'🌆 Abend · Mile End — Auswahl (ab ~19:00)'},
     {note:'💡 Meine Empfehlungs-Reihenfolge: 1) Lawrence – Mile-End-Klassiker, Nose-to-tail · 2) Beau Temps – Naturwein-Bar, geteilte Teller · 3) Larry\'s – lockeres Bistro der Lawrence-Crew. Reservieren.'},

   {iso:'2026-08-03',dt:'Mo 03.08.',title:'Little Italy & Plateau',
    route:{walk:true,mode:'🚶 Metro + zu Fuß · ganzer Tag',
     lead:'Vormittags Little Italy rund um den Jean-Talon-Markt (Foodie-Grazing), nachmittags südwärts ins Plateau (Park, Murals, Läden), Apéro im Tap-Room, abends québecoise Spitzenküche. Reihenfolge = Laufreihenfolge.'},
    items:[
     I('Marché Jean-Talon','market','großer Freiluftmarkt · Grazing statt Mittagstisch','Marché Jean-Talon Montréal','v','https://www.marchespublics-mtl.com',{must:true,time:'10:00',info:{d:'Einer der größten Freiluftmärkte Nordamerikas im Herzen von Little Italy: Obst, Gemüse, Käse, Ahornsirup, Patisserien und Imbisse mit lokalen Produzenten.',t:'Käse und Ahornprodukte eignen sich als Mitbringsel; hier durchprobieren statt Mittagstisch.'}}),
     I('Caffè San Simeon','cafe','Kult-Allongé am Markt · wenige Dollar','Caffè San Simeon Montréal','v','',{time:'10:30',noroute:true,info:{d:'Winziger italienischer Espresso-Stand am Rand des Marktes – Kult-Allongé für wenig Geld, ohne Schnickschnack.',t:'Im Stehen wie die Locals.'}}),
     I('Église Madonna della Difesa','sight','Herzkirche mit kuriosem Fresko','Madonna della Difesa Montréal','v','',{gem:true,time:'10:50',info:{d:'Little Italys Herzkirche mit einem Deckenfresko, das angeblich Mussolini zu Pferd zeigt – ein stilles, kurioses Detail abseits des Marktes.',t:'Kurzer Abstecher, wenige Minuten vom Markt.'}}),
     I('Quincaillerie Dante','shop','historischer ital. Feinkost-/Küchenladen','Quincaillerie Dante Montréal','v','',{time:'11:15',noroute:true,info:{d:'Historischer italienischer Küchen- und Feinkostladen, seit Generationen Familienbetrieb – echtes Little Italy zwischen Espressokannen und Jagdzubehör.',t:'Schön zum Stöbern; gute Küchen-Mitbringsel.'}}),
     I('MELLÖN Brasserie','beer','Mikrobrauerei direkt am Markt','MELLÖN Brasserie Montréal','v','https://mellonbrasserie.ca',{time:'11:45',info:{d:'Junge Mikrobrauerei direkt am Jean-Talon-Markt – praktisch für eine Bierpause beim Marktbummel.',t:'Terrasse bei gutem Wetter.'}}),

const KEY='kanada2026:v1';
let state=JSON.parse(localStorage.getItem(KEY)||'{}');
function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function get(id){return state[id]||{};}
function setv(id,k,v){state[id]=Object.assign({},state[id],{[k]:v});save();updateProgress();}
function mapUrl(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);}
function routeUrl(){return 'https://www.google.com/maps/dir/'+['Montréal-Trudeau Airport, QC','Québec City, QC','Baie-Saint-Paul, QC','Trois-Rivières, QC','Ottawa, ON','Prince Edward County, ON','Toronto Pearson Airport, ON'].map(encodeURIComponent).join('/');}
function bookUrl(name,ci,co){return 'https://www.booking.com/searchresults.html?ss='+encodeURIComponent(name)+'&checkin='+ci+'&checkout='+co+'&group_adults=2&no_rooms=1&group_children=0';}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function isoToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function infoPanelHtml(info,url){
  return `<div class="infopanel">
    <p>${esc(info.d)}</p>
    ${info.t?`<div class="tip">💡 <b>Tipp:</b> ${esc(info.t)}</div>`:''}
    ${url?`<a class="ilink" href="${esc(url)}" target="_blank" rel="noopener">🔗 Mehr / offizielle Seite</a>`:''}
  </div>`;
}
function itemHtml(it,id,ord){
  const st=get(id);
  const info=it.info||INFO[it.nm];
  const url=it.url || (info&&info.u) || '';
  const drag = ord?`draggable="true" data-daykey="${ord.dayKey}" data-pos="${ord.pos}"`:'';
  const ctrl = ord?`<div class="ord"><button class="ordup" data-daykey="${ord.dayKey}" data-pos="${ord.pos}" ${ord.pos===0?'disabled':''} aria-label="hoch">▲</button><button class="orddn" data-daykey="${ord.dayKey}" data-pos="${ord.pos}" ${ord.pos===ord.len-1?'disabled':''} aria-label="runter">▼</button></div>`:'';
  return `<div class="item ${st.done?'done':''} ${st._open?'openinfo':''} ${it.gem?'isgem':''} ${it.must?'ismust':''}" data-id="${id}" ${drag}>
    ${ord?'<div class="grip" title="ziehen zum Sortieren">⠿</div>':''}
    <input type="checkbox" class="cb" ${st.done?'checked':''} aria-label="erledigt">
    <div class="ico">${CAT[it.cat]||'📌'}</div>
    <div class="main">
      <div class="nm ${info?'hasinfo':''}">${it.time?'<span class="tchip">🕘 '+esc(it.time)+'</span>':''}${it.must?'<span class="pbadge must">⭐ Must-see</span>':''}${it.gem?'<span class="pbadge gem">💎 Perle</span>':''}${esc(it.nm)}${info?'<span class="infochev">›</span>':''}</div>
      ${it.nt?`<div class="nt">${esc(it.nt)}</div>`:''}
      <div class="acts">
        <a class="pill map" href="${mapUrl(it.map)}" target="_blank" rel="noopener">🧭 Karte</a>
        ${url?`<a class="pill web" href="${esc(url)}" target="_blank" rel="noopener">🔗 Web</a>`:''}
        ${info?'<span class="pill infoBtn">ℹ️ Hintergrund</span>':''}
        <span class="pill noteBtn">📝 Notiz</span>
        <span class="src ${it.src}">${SRC[it.src]}</span>
      </div>
      ${info?infoPanelHtml(info,url):''}
      <textarea class="note ${st.note?'show':''}" placeholder="Deine Notiz…">${esc(st.note||'')}</textarea>
    </div>

    <button class="star ${st.fav?'on':''}" aria-label="Favorit">${st.fav?'★':'☆'}</button>

}
// Sortier-Reihenfolge pro Tag
function dayOrder(dayKey,n){
  let o=(state._order||{})[dayKey];
  if(!o||o.length!==n||o.some(x=>x>=n||x<0)) o=Array.from({length:n},(_,i)=>i);
  return o;
}
function setDayOrder(dayKey,arr){state._order=Object.assign({},state._order,{[dayKey]:arr});save();}
function moveInDay(dayKey,pos,dir){
  const day=findDay(dayKey);if(!day)return;
  const o=dayOrder(dayKey,day.items.length).slice();
  const np=pos+dir;if(np<0||np>=o.length)return;
  [o[pos],o[np]]=[o[np],o[pos]];setDayOrder(dayKey,o);renderPlan();syncPlanChecks();updateProgress();
}
function findDay(dayKey){ // dayKey = si+'-'+di  oder  si+'-d'
  const parts=dayKey.split('-');const si=+parts[0];
  if(parts[1]==='d')return {items:STAGES[si].items,base:si+'-d'};
  const di=+parts[1];return {items:STAGES[si].days[di].items,base:si+'-'+di};
}
function stageIds(s,si){
  return s.drive ? s.items.map((_,ii)=>si+'-d-'+ii)
    : s.days.flatMap((d,di)=>d.items.map((_,ii)=>si+'-'+di+'-'+ii));
}
function allItems(){ // [it, id, si, dayObj|null]
  const out=[];
  STAGES.forEach((s,si)=>{
    if(s.drive)s.items.forEach((it,ii)=>out.push([it,si+'-d-'+ii,si,null]));
    else s.days.forEach((d,di)=>d.items.forEach((it,ii)=>out.push([it,si+'-'+di+'-'+ii,si,d])));
  });
  return out;
}

// ---- Touren & Export ----
function gmapsRoute(stops){return 'https://www.google.com/maps/dir/'+stops.map(encodeURIComponent).join('/');}
function coordFor(q){const p=GEO.pins.find(x=>x.q===q);if(p)return p.ll;const r=GEO.route.find(x=>x.q===q);return r?r.ll:null;}
function buildGpx(name,stops){
  let w='',n=0;
  stops.forEach(s=>{const ll=coordFor(s.q);if(ll){n++;w+=`<wpt lat="${ll[0]}" lon="${ll[1]}"><name>${esc(s.nm)}</name></wpt>\n`;}});
  if(!n)return null;
  return `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="Kanada2026" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>${esc(name)}</name></metadata>\n${w}</gpx>`;
}
function tourBtns(label,names,gpxStops,mapsLabel){
  const hasGpx=gpxStops.some(s=>coordFor(s.q));
  return `<div class="tourbtns">
    <a class="tbtn" href="${gmapsRoute(names)}" target="_blank" rel="noopener">🗺️ ${mapsLabel||'Google-Maps-Route'}</a>
    ${hasGpx?`<button class="tbtn gpx" data-gpx='${esc(JSON.stringify(gpxStops))}' data-gpxname="${esc(label)}">📥 GPX (Komoot)</button>`:''}
  </div>`;
}
function dayTours(d,dk,ord,si,di){ // AM/PM-Touren für einen Tag
  const len=ord.length, split=Math.ceil(len/2);
  const sl=d.slots||[['☀️','Vormittags-Tour'],['🌆','Nachmittags-Tour']];
  const groups=[[sl[0][0],sl[0][1],0,split],[sl[1][0],sl[1][1],split,len]];
  let h='';
  groups.forEach(([emo,lab,a,b])=>{
    if(b<=a)return;
    const stops=[];for(let p=a;p<b;p++)stops.push(d.items[ord[p]]);
    const names=stops.map(s=>s.map), gpx=stops.map(s=>({nm:s.nm,q:s.map}));
    h+=`<div class="tour"><div class="tourhd">${emo} ${lab} <span class="cnt2">${stops.length} Stopps</span></div>`;
    h+=tourBtns(lab,names,gpx);
    for(let p=a;p<b;p++)h+=itemHtml(d.items[ord[p]],si+'-'+di+'-'+ord[p],{dayKey:dk,pos:p,len});
    h+=`</div>`;
  });
  return h;
}
function transitHtml(s){
  if(!s.transit)return '';const t=s.transit;
  return `<div class="transit">🚇 <b>ÖPNV ${esc(t.city||'')}:</b> ${esc(t.txt)}${t.url?` · <a href="${esc(t.url)}" target="_blank" rel="noopener">Tickets</a>`:''}</div>`;
}
function parkingHtml(s){

  return `<div class="parking">🅿️ <b>Parken:</b> ${esc(p)}</div>`;
}
function shoppingHtml(s){

  const items=s.shopping.map(m=>{

  }).join('');
  return `<div class="shopping">🛍️ <b>Shopping & Outlets:</b><ul>${items}</ul></div>`;

function extrasHtml(s){

  const list=(arr)=>arr.map(x=>{
    const web=x.u?` <a href="${esc(x.u)}" target="_blank" rel="noopener" title="Website">🔗</a>`:'';

  }).join('');
  let h='<div class="extras">';
  if(s.photo&&s.photo.length) h+=`<div class="ex-sec"><h5>📷 Foto-Spots</h5><ul>${list(s.photo)}</ul></div>`;
  if(s.breakfast&&s.breakfast.length) h+=`<div class="ex-sec"><h5>🥐 Frühstück (Locals)</h5><ul>${list(s.breakfast)}</ul></div>`;
  if(s.hike&&s.hike.length) h+=`<div class="ex-sec"><h5>🥾 Wanderperlen</h5><ul>${list(s.hike)}</ul></div>`;
  if(s.sunset&&s.sunset.length) h+=`<div class="ex-sec"><h5>🌇 Aussichts-Bars (Sonnenuntergang)</h5><ul>${list(s.sunset)}</ul></div>`;
  h+='</div>';
  return h;
}
function stageBaseQ(s){ return (s.booking&&s.booking.q) || s.baseQ || s.name; }
function routeHtml(d,s){
  const r=d.route; if(!r) return '';
  const from=r.from||stageBaseQ(s);
  const steps=r.steps||[];
  const q=[]; let n=0, li='';
  steps.forEach(x=>{
    if(x.part){ li+=`<li class="rt-part">${esc(x.part)}</li>`; return; }
    if(x.transfer){ li+=`<li class="rt-transfer">↳ <span><b>Übergang:</b> ${esc(x.transfer)}</span></li>`; return; }
    n++; q.push(x.q||x.n);
    li+=`<li class="${x.gem?'rt-gem':''}"><span class="rt-n">${x.gem?'💎':n}</span><div><b>${esc(x.n)}</b>${x.d?` <span class="rt-d">· ${esc(x.d)}</span>`:''}</div></li>`;
  });
  const enc=encodeURIComponent, mode=r.walk?'walking':'driving';
  let url='https://www.google.com/maps/dir/?api=1&travelmode='+mode+'&origin='+enc(from);
  if(q.length){ url+='&destination='+enc(q[q.length-1]); const mids=q.slice(0,-1); if(mids.length) url+='&waypoints='+mids.map(enc).join('%7C'); }
  else { url+='&destination='+enc(from); }
  return `<div class="dayroute">
    <div class="rt-head">🗺️ <b>Tagesroute</b>${r.mode?`<span class="rt-mode">${esc(r.mode)}</span>`:''}</div>
    ${r.lead?`<div class="rt-lead">${esc(r.lead)}</div>`:''}
    <ol class="rt-list">${li}</ol>
    <a class="rt-btn" href="${esc(url)}" target="_blank" rel="noopener">🧭 Route in Google Maps öffnen</a>
  </div>`;
}
function dayFlowHtml(d,s,si,di){
  const dk=si+'-'+di, r=d.route||{};
  let body='', order=[];
  (d.flow||[]).forEach(e=>{
    if(typeof e==='number'){ const it=d.items[e]; if(it){ body+=itemHtml(it,dk+'-'+e); if(!it.noroute) order.push(it.map);} return; }
    if(e.seg){ body+=`<div class="fseg">${esc(e.seg)}</div>`; return; }
    if(e.tr){ body+=`<div class="ftr">↳ <span><b>Übergang:</b> ${esc(e.tr)}</span></div>`; return; }
    if(e.note){ body+=`<div class="fnote">${esc(e.note)}</div>`; return; }
    if(e.home){ body+=`<div class="ftr fhome">🏨 <span><b>Rückweg zum Hotel:</b> ${esc(e.home)}</span></div>`; return; }
  });
  const from=r.from||stageBaseQ(s), mode=r.drive?'driving':'walking', enc=encodeURIComponent;
  let url='https://www.google.com/maps/dir/?api=1&travelmode='+mode+'&origin='+enc(from);
  if(order.length){ url+='&destination='+enc(order[order.length-1]); const mids=order.slice(0,-1); if(mids.length) url+='&waypoints='+mids.map(enc).join('%7C'); }
  else url+='&destination='+enc(from);
  return `<div class="dayflow">
    <div class="rt-head">🗺️ <b>Tagesablauf</b>${r.mode?`<span class="rt-mode">${esc(r.mode)}</span>`:''}</div>
    ${r.lead?`<div class="rt-lead">${esc(r.lead)}</div>`:''}
    ${body}
    <a class="rt-btn" href="${esc(url)}" target="_blank" rel="noopener">🧭 Gesamte Tagesroute in Google Maps</a>
  </div>`;
}

function bookingHtml(s){
  if(!s.booking)return '';
  const b=s.booking;
  const mk=b.markets.map(m=>`<a href="${mapUrl(m.q)}" target="_blank" rel="noopener">🛒 ${esc(m.nm)}</a> <span style="color:var(--muted)">(${esc(m.d)})</span>`).join(' · ');

function renderToday(){
  const t=isoToday();
  const el=document.getElementById('today');
  let h='';
  if(t<TRIP_START){
    const days=Math.ceil((new Date(TRIP_START)-new Date(t))/86400000);
    h+=`<div class="today-hero">${HERO_SVG}<div class="big">Noch ${days} Tage bis Kanada 🍁</div>
      <div class="mini">Abflug: Fr 31.07.2026 · Landung Montréal am Nachmittag</div></div>`;
    const open=PREP.map((p,i)=>['prep-'+i,p]).filter(([id])=>!(state._check||{})[id]);
    h+=`<div class="card"><h2>✅ Offene Vorbereitungen (${open.length})</h2>`;
    h+= open.length? open.slice(0,8).map(([id,p])=>`<div class="clitem"><div class="nm">${esc(p[0])}${p[1]?`<span class="why">${esc(p[1])}</span>`:''}</div></div>`).join('')
      : '<p class="sub">Alles erledigt – ihr seid startklar! 🎉</p>';
    h+=`<div style="margin-top:10px"><button class="btn sec" data-goto="lists">Zur Checkliste →</button></div></div>`;
    h+=`<div class="card"><h2>🎫 Nicht vergessen</h2><p class="sub">eTA beantragen · Hotels Montréal früh sichern (Osheaga!) · AML-Waltour reservieren.</p></div>`;
  } else if(t>TRIP_END){
    h+=`<div class="today-hero">${HERO_SVG}<div class="big">Willkommen zurück! 🛬</div>
      <div class="mini">23 Tage Ostkanada – wir hoffen, es war großartig.</div></div>`;
  } else {
    const dayNum=Math.round((new Date(t)-new Date(TRIP_START))/86400000)+1;
    // Passende Tage/Fahrten finden
    let blocks=[];
    STAGES.forEach((s,si)=>{
      if(s.drive && s.iso===t)blocks.push({type:'drive',s,si});
      if(!s.drive)s.days.forEach((d,di)=>{if(d.iso===t)blocks.push({type:'day',s,si,d,di});});
    });
    const stageName=blocks.length?blocks[blocks.length-1].s.name:'Unterwegs';
    h+=`<div class="today-hero">${HERO_SVG}<div class="big">Reisetag ${dayNum} von ${TRIP_DAYS}</div>
      <div class="mini">${esc(stageName)} · ${t.split('-').reverse().join('.')}</div></div>`;
    // Flüge heute
    FLIGHTS.filter(f=>f.iso===t).forEach(f=>h+=`<div class="card" style="padding:10px 12px">${flightHtml(f)}</div>`);
    // Buchung der aktuellen Etappe
    const bst=blocks.map(b=>b.s).find(x=>x.booking);
    if(bst)h+=bookingHtml(bst);
    // Events heute
    const evs=EVENTS.filter(e=>(e.dates||[]).includes(t));
    if(evs.length){
      h+=`<div class="card"><h2>🎉 Heute läuft</h2>`;
      evs.forEach(e=>h+=`<p>• <b>${esc(e.nm)}</b><span class="sub"> – ${esc(e.meta)}</span>${e.url?` <a class="ilink" href="${esc(e.url)}" target="_blank" rel="noopener">🔗 Infos</a>`:''}</p>`);
      h+=`</div>`;
    }
    blocks.forEach(b=>{
      if(b.type==='drive'){
        const dk=b.si+'-d',ord=dayOrder(dk,b.s.items.length);
        const names=ord.map(ii=>b.s.items[ii].map), gpx=ord.map(ii=>({nm:b.s.items[ii].nm,q:b.s.items[ii].map}));
        h+=`<div class="card"><h2>🚗 ${esc(b.s.name)}</h2><p class="sub">${esc(b.s.sub)}</p>`;
        h+=tourBtns('Fahrt '+b.s.name,names,gpx,'Fahrt-Route (Google Maps)');
        ord.forEach(ii=>h+=itemHtml(b.s.items[ii],b.si+'-d-'+ii));
        h+=tourExtraHtml(b.s.name);
        h+=`</div>`;
      } else {
        const dk=b.si+'-'+b.di,ord=dayOrder(dk,b.d.items.length);
        h+=`<div class="card"><h2>📍 ${esc(b.d.title)}</h2>`;
        h+=transitHtml(b.s)+parkingHtml(b.s);
        h+=modesHtml(b.s.name,'modes--flush');
        if(b.d.flow){ h+=dayFlowHtml(b.d,b.s,b.si,b.di); }
        else { h+=dayTours(b.d,dk,ord,b.si,b.di); h+=tourExtraHtml(b.d.title); }
        h+=`</div>`;
      }
    });
    // Morgen-Vorschau
    const tm=new Date(t);tm.setDate(tm.getDate()+1);
    const tmIso=tm.getFullYear()+'-'+String(tm.getMonth()+1).padStart(2,'0')+'-'+String(tm.getDate()).padStart(2,'0');
    let tmTxt='';
    STAGES.forEach(s=>{
      if(s.drive && s.iso===tmIso)tmTxt=s.name+' ('+s.sub.split('·')[1]+')';
      if(!s.drive)s.days.forEach(d=>{if(d.iso===tmIso)tmTxt=d.title;});
    });
    if(tmTxt)h+=`<div class="tomorrow">🔜 <b>Morgen:</b> ${esc(tmTxt)}</div>`;
  }
  el.innerHTML=h;
}

const STAGECOL=['#a01e1e','#9a8478','#1a73e8','#9a8478','#2f6b4f','#7c5cbf','#0f7b8a','#9a8478','#c8932a','#9a8478','#37476b'];
function dayByIso(iso){
  for(let si=0;si<STAGES.length;si++){const s=STAGES[si];
    if(s.drive){ if(s.iso===iso) return {si,type:'drive',s}; }
    else { for(let di=0;di<s.days.length;di++){ if(s.days[di].iso===iso) return {si,di,type:'day',s,d:s.days[di]}; } }
  }
  return null;
}
let _calSel=null;
function pad2(n){return String(n).padStart(2,'0');}
function renderCal(){
  const months=[[2026,6,'Juli 2026'],[2026,7,'August 2026']];
  const today=isoToday();
  let h='<div class="mapnote">Tippe einen farbigen Reisetag für den Tagesplan. Farbe = Etappe.</div>';
  months.forEach(([y,m,label])=>{
    h+=`<div class="calhead"><h2>${label}</h2></div><div class="calgrid">`;
    ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>h+=`<div class="dow">${d}</div>`);
    const first=new Date(y,m,1);
    const lead=(first.getDay()+6)%7; // Mo-first
    const dim=new Date(y,m+1,0).getDate();
    for(let i=0;i<lead;i++)h+=`<div class="calcell empty"></div>`;
    for(let dn=1;dn<=dim;dn++){
      const iso=y+'-'+pad2(m+1)+'-'+pad2(dn);
      const b=dayByIso(iso);
      const ev=EVENTS.some(e=>(e.dates||[]).includes(iso));
      if(b){
        const col=STAGECOL[b.si]||'#a01e1e';
        const nm=b.type==='drive'?'🚗 '+b.s.name:b.s.name;
        h+=`<div class="calcell trip ${iso===today?'today':''} ${iso===_calSel?'sel':''}" data-calday="${iso}">
          <div class="dn">${dn}</div>${ev?'<div class="evdot">🎉</div>':''}
          <div class="stg" style="background:${col}">${esc(nm)}</div></div>`;
      } else {
        h+=`<div class="calcell ${iso===today?'today':''}"><div class="dn" style="color:var(--muted)">${dn}</div></div>`;
      }
    }
    h+=`</div>`;
  });
  h+=`<div class="caldetail" id="caldetail"></div>`;

  if(_calSel)renderCalDetail(_calSel);
}
function allBlocksByIso(iso){
  const out=[];

    if(s.drive){if(s.iso===iso)out.push({si,type:'drive',s});}
    else s.days.forEach((d,di)=>{if(d.iso===iso)out.push({si,di,type:'day',s,d});});
  });
  return out;
}

      h+=tourBtns('Fahrt '+b.s.name,names,gpx,'Fahrt-Route (Google Maps)');
      ord.forEach(ii=>h+=itemHtml(b.s.items[ii],b.si+'-d-'+ii));
      h+=tourExtraHtml(b.s.name);
    } else {
      if(b.s.booking)h+=bookingHtml(b.s); else if(b.s.hotel)h+=`<p class="sub">🏨 ${esc(b.s.hotel)}</p>`;
      h+=transitHtml(b.s)+parkingHtml(b.s);

}

function renderFavs(){
  let h='';let n=0;
  STAGES.forEach((s,si)=>{
    const list = s.drive ? s.items.map((it,ii)=>[it,si+'-d-'+ii]) :
      s.days.flatMap((d,di)=>d.items.map((it,ii)=>[it,si+'-'+di+'-'+ii]));
    const favs=list.filter(([it,id])=>get(id).fav);
    if(favs.length){
      h+=`<div class="stage"><div class="head" style="cursor:default"><span class="badge">${s.badge}</span><div style="flex:1"><h2>${esc(s.name)}</h2></div></div><div class="body"><div class="day">`;
      favs.forEach(([it,id])=>{h+=itemHtml(it,id);n++;});
      h+=`</div></div></div>`;
    }
  });
  document.getElementById('favs').innerHTML = n? h : '<div class="empty">Noch keine Favoriten.<br>Tippe bei einem Spot auf den ☆-Stern.</div>';
}

// ================= LISTEN =================
function clBlock(title,arr,prefix,emoji){
  const chk=state._check||{};
  let done=0;
  let rows=arr.map((p,i)=>{
    const id=prefix+'-'+i; if(chk[id])done++;
    return `<div class="clitem ${chk[id]?'done':''}">
      <input type="checkbox" class="cb clcb" data-cl="${id}" ${chk[id]?'checked':''}>
      <div class="nm">${esc(p[0])}${p[1]?`<span class="why">${esc(p[1])}</span>`:''}</div></div>`;
  }).join('');
  const customs=(state._custom||[]).filter(c=>c.list===prefix);
  customs.forEach((c,i)=>{
    const id=prefix+'-x-'+i; if(chk[id])done++;
    rows+=`<div class="clitem ${chk[id]?'done':''}">
      <input type="checkbox" class="cb clcb" data-cl="${id}" ${chk[id]?'checked':''}>
      <div class="nm">${esc(c.nm)}</div>
      <button class="x bentry-x" data-delc="${prefix}|${i}" style="border:0;background:none;color:#c25555;cursor:pointer">✕</button></div>`;
  });
  const total=arr.length+customs.length;
  return `<div class="card"><h2>${emoji} ${title} <span class="sub" style="font-weight:400">· ${done}/${total}</span></h2>${rows}
    <div class="addrow"><input type="text" placeholder="Eigenen Punkt hinzufügen…" data-addinp="${prefix}">
    <button class="btn sec" data-add="${prefix}">+</button></div></div>`;
}
function renderLists(){
  document.getElementById('lists').innerHTML =
    clBlock('Reisevorbereitung',PREP,'prep','🎫') + clBlock('Packliste',PACK,'pack','🧳');
}

// ================= BUDGET =================
function renderBudget(){
  const b=state._budget||[]; const rate=state._rate||0.67;
  const totCad=b.reduce((s,e)=>s+(e.cur==='CAD'?e.amt:e.amt/rate),0);
  const totEur=b.reduce((s,e)=>s+(e.cur==='EUR'?e.amt:e.amt*rate),0);
  const byCat={};b.forEach(e=>{const eur=e.cur==='EUR'?e.amt:e.amt*rate;byCat[e.cat]=(byCat[e.cat]||0)+eur;});
  const maxCat=Math.max(1,...Object.values(byCat));
  let h=`<div class="card"><h2>💰 Ausgabe erfassen</h2>
    <div class="brow">
      <input type="text" id="bdesc" class="bfull" placeholder="Was? (z. B. Abendessen L'Express)">
      <input type="number" id="bamt" inputmode="decimal" step="0.01" placeholder="Betrag">
      <select id="bcur"><option>CAD</option><option>EUR</option></select>
      <select id="bcat" class="bfull">${BCATS.map(c=>`<option>${c}</option>`).join('')}</select>
    </div>
    <button class="btn" id="badd">Hinzufügen</button>
    <div class="rate">Kurs: 1 CAD = <input type="number" id="brate" step="0.01" value="${rate}"> EUR</div>
  </div>`;
  h+=`<div class="card"><h2>📊 Übersicht</h2>
    <div class="btotal">
      <div class="box"><div class="v">${totEur.toFixed(0)} €</div><div class="l">Gesamt EUR</div></div>
      <div class="box"><div class="v">${totCad.toFixed(0)} $</div><div class="l">Gesamt CAD</div></div>
      <div class="box"><div class="v">${b.length}</div><div class="l">Einträge</div></div>
    </div>`;
  BCATS.forEach(c=>{
    if(!byCat[c])return;
    h+=`<div class="bcat"><div class="lbl"><span>${c}</span><b>${byCat[c].toFixed(0)} €</b></div>
      <div class="bar"><i style="width:${(byCat[c]/maxCat*100).toFixed(0)}%"></i></div></div>`;
  });
  h+='</div>';
  if(b.length){
    h+='<div class="card"><h2>🧾 Einträge</h2>';
    [...b].reverse().forEach(e=>{
      h+=`<div class="bentry"><span class="d">${e.d}</span><span class="n">${esc(e.nm)}<br><span style="font-size:11px;color:var(--muted)">${e.cat}</span></span>
        <span class="a">${e.amt.toFixed(2)} ${e.cur}</span><button class="x" data-bdel="${e.id}">✕</button></div>`;
    });
    h+='</div>';
  }
  document.getElementById('budget').innerHTML=h;
}

// ================= PROGRESS =================
function updateProgress(){
  let total=0,done=0;
  STAGES.forEach((s,si)=>{stageIds(s,si).forEach(id=>{total++;if(get(id).done)done++;});});
  const pct= total? Math.round(done/total*100):0;
  document.getElementById('bar').style.width=pct+'%';
  document.getElementById('ptxt').textContent=`${done} von ${total} Spots erledigt · ${pct}%`;
  // Etappen-Zähler aktualisieren
  document.querySelectorAll('[data-cnt]').forEach(el=>{
    const si=+el.dataset.cnt;const ids=stageIds(STAGES[si],si);
    el.textContent=ids.filter(id=>get(id).done).length+'/'+ids.length;
  });
}
function updateCountdown(){
  const t=isoToday();const el=document.getElementById('countdown');
  if(t<TRIP_START){const days=Math.ceil((new Date(TRIP_START)-new Date(t))/86400000);
    el.textContent=`✈️ Noch ${days} Tage bis zur Abreise`;}
  else if(t>TRIP_END){el.textContent='🛬 Reise abgeschlossen';}
  else{const n=Math.round((new Date(t)-new Date(TRIP_START))/86400000)+1;
    el.textContent=`🍁 Reisetag ${n} von ${TRIP_DAYS}`;}
}

// ================= INTERAKTION =================
document.addEventListener('click',e=>{
  // Etappe auf/zu
  const head=e.target.closest('.stage > .head');
  if(head && head.parentElement.dataset.si!==undefined && document.getElementById('planList').contains(head)){
    head.parentElement.classList.toggle('collapsed');return;}
  // Stern
  if(e.target.classList.contains('star')){
    const it=e.target.closest('.item');const id=it.dataset.id;const nv=!get(id).fav;
    setv(id,'fav',nv);e.target.classList.toggle('on',nv);e.target.textContent=nv?'★':'☆';return;}
  // Notiz
  if(e.target.classList.contains('noteBtn')){
    const ta=e.target.closest('.item').querySelector('.note');ta.classList.toggle('show');if(ta.classList.contains('show'))ta.focus();return;}
  // Hintergrund-Info auf-/zuklappen (Klick auf Namen oder „ℹ️ Hintergrund")
  if(e.target.classList.contains('infoBtn') || e.target.closest('.nm.hasinfo')){
    const it=e.target.closest('.item');if(it&&it.querySelector('.infopanel'))it.classList.toggle('openinfo');return;}
  // Schlechtwetter-/Entspannen-Button auf-/zuklappen
  if(e.target.classList.contains('modebtn')){
    e.target.closest('.mode').classList.toggle('open');return;}
  // Sortier-Pfeile
  if(e.target.classList.contains('ordup')||e.target.classList.contains('orddn')){
    moveInDay(e.target.dataset.daykey,+e.target.dataset.pos,e.target.classList.contains('ordup')?-1:1);return;}
  // Kalendertag → Tagesplan
  const cc=e.target.closest('.calcell.trip');
  if(cc){_calSel=cc.dataset.calday;renderCal();const dt=document.getElementById('caldetail');if(dt)dt.scrollIntoView({behavior:'smooth',block:'nearest'});return;}
  // GPX-Download (Komoot)
  if(e.target.classList.contains('gpx')){
    try{
      const stops=JSON.parse(e.target.dataset.gpx);const nm=e.target.dataset.gpxname||'Tour';
      const g=buildGpx(nm,stops);
      if(!g){alert('Für diese Tour liegen noch keine GPS-Koordinaten vor – nutze den Google-Maps-Routenlink (der funktioniert immer).');return;}
      const blob=new Blob([g],{type:'application/gpx+xml'});const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);a.download=nm.replace(/[^\w]+/g,'_')+'.gpx';a.click();
    }catch(_){}
    return;}
  // PDF / Druck
  if(e.target.id==='pdfBtn'){doPrint();return;}
  // Reisebericht kopieren
  if(e.target.id==='storyCopyBtn'){
    const done=()=>{e.target.textContent='✓ Kopiert!';setTimeout(()=>{e.target.textContent='📋 Als Text kopieren';},1800);};
    try{navigator.clipboard.writeText(_storyText).then(done,()=>done());}
    catch(_){alert('Kopieren nicht möglich – bitte den Text manuell markieren.');}
    return;}
  // Chips
  if(e.target.classList.contains('chip')){filterGrp=e.target.dataset.grp;renderChips();renderPlan();updateProgress();return;}
  // Karte → Etappe
  const mn=e.target.closest('.mnode');
  if(mn && mn.dataset.si!==''){
    switchTab('plan');
    const st=document.getElementById('stage-'+mn.dataset.si);
    if(st){st.classList.remove('collapsed');st.scrollIntoView({behavior:'smooth',block:'start'});}
    return;}
  // Heute → Listen
  if(e.target.dataset.goto){switchTab(e.target.dataset.goto);return;}
  // Checklisten: eigener Punkt
  if(e.target.dataset.add!==undefined && e.target.dataset.add){
    const pre=e.target.dataset.add;
    const inp=document.querySelector(`[data-addinp="${pre}"]`);
    if(inp.value.trim()){state._custom=(state._custom||[]);state._custom.push({list:pre,nm:inp.value.trim()});save();renderLists();}
    return;}
  if(e.target.dataset.delc){
    const [pre,i]=e.target.dataset.delc.split('|');
    const customs=(state._custom||[]).filter(c=>c.list===pre);
    const all=state._custom||[];const target=customs[+i];
    state._custom=all.filter(c=>c!==target);save();renderLists();return;}
  // Budget
  if(e.target.id==='badd'){
    const nm=document.getElementById('bdesc').value.trim();
    const amt=parseFloat(document.getElementById('bamt').value);
    if(!nm||!amt||amt<=0)return;
    const cur=document.getElementById('bcur').value, cat=document.getElementById('bcat').value;
    const d=new Date();const ds=String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.';
    state._budget=(state._budget||[]);state._budget.push({id:Date.now(),d:ds,nm,amt,cur,cat});
    save();renderBudget();return;}
  if(e.target.dataset.bdel){
    state._budget=(state._budget||[]).filter(x=>String(x.id)!==e.target.dataset.bdel);save();renderBudget();return;}
  // Backup
  if(e.target.id==='expBtn'){
    const j=JSON.stringify(state);document.getElementById('ioArea').value=j;
    try{navigator.clipboard.writeText(j);}catch(_){}
    const blob=new Blob([j],{type:'application/json'});const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download='kanada2026-backup.json';a.click();return;}
  if(e.target.id==='impBtn'){
    try{const j=JSON.parse(document.getElementById('ioArea').value);state=j;save();
      renderAll();alert('Import erfolgreich!');}
    catch(_){alert('Ungültiges JSON – bitte kompletten Export einfügen.');}return;}
  if(e.target.id==='resetBtn'){
    if(confirm('Wirklich ALLES löschen (Häkchen, Favoriten, Notizen, Budget, Listen)?')){state={};save();renderAll();}return;}
  if(e.target.id==='themeBtn'){
    const cur=document.body.dataset.theme==='dark'?'light':'dark';
    document.body.dataset.theme=cur;state._theme=cur;save();
    e.target.textContent=cur==='dark'?'☀️':'🌙';return;}
});
document.addEventListener('change',e=>{
  if(e.target.classList.contains('clcb')){
    state._check=Object.assign({},state._check,{[e.target.dataset.cl]:e.target.checked});save();
    e.target.closest('.clitem').classList.toggle('done',e.target.checked);
    renderLists();return;}
  if(e.target.classList.contains('cb')&&e.target.closest('.item')){
    const it=e.target.closest('.item');const id=it.dataset.id;setv(id,'done',e.target.checked);
    it.classList.toggle('done',e.target.checked);}
  if(e.target.id==='brate'){state._rate=parseFloat(e.target.value)||0.67;save();renderBudget();}
});
document.addEventListener('input',e=>{
  if(e.target.classList.contains('note')){const id=e.target.closest('.item').dataset.id;setv(id,'note',e.target.value);}
  if(e.target.id==='q'){filterQ=e.target.value;renderPlan();updateProgress();}
});
// Drag & Drop (Desktop)
let _drag=null;
document.addEventListener('dragstart',e=>{
  const it=e.target.closest('.item[draggable="true"]');if(!it)return;
  _drag={dayKey:it.dataset.daykey,pos:+it.dataset.pos};it.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',it.dataset.pos);}catch(_){}
});
document.addEventListener('dragover',e=>{
  const it=e.target.closest('.item[draggable="true"]');
  if(!it||!_drag||it.dataset.daykey!==_drag.dayKey)return;
  e.preventDefault();
  document.querySelectorAll('.item.dragover').forEach(x=>x.classList.remove('dragover'));
  it.classList.add('dragover');
});
document.addEventListener('drop',e=>{
  const it=e.target.closest('.item[draggable="true"]');
  if(!it||!_drag||it.dataset.daykey!==_drag.dayKey)return;
  e.preventDefault();
  const from=_drag.pos,to=+it.dataset.pos;
  if(from!==to){
    const day=findDay(_drag.dayKey);
    const o=dayOrder(_drag.dayKey,day.items.length).slice();
    const [m]=o.splice(from,1);o.splice(to,0,m);
    setDayOrder(_drag.dayKey,o);renderPlan();syncPlanChecks();updateProgress();
  }
  _drag=null;
});
document.addEventListener('dragend',()=>{
  document.querySelectorAll('.dragging,.dragover').forEach(x=>x.classList.remove('dragging','dragover'));_drag=null;
});
function syncPlanChecks(){
  document.querySelectorAll('#planList .item').forEach(el=>{
    const st=get(el.dataset.id);
    el.classList.toggle('done',!!st.done);
    const cb=el.querySelector('.cb');if(cb)cb.checked=!!st.done;
    const star=el.querySelector('.star');if(star){star.classList.toggle('on',!!st.fav);star.textContent=st.fav?'★':'☆';}
  });
}
function switchTab(t){
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('show',p.id===t));
  if(t==='favs')renderFavs();
  if(t==='today')renderToday();
  if(t==='budget')renderBudget();
  if(t==='lists')renderLists();
  if(t==='cal')renderCal();
  if(t==='story')renderStory();
  if(t==='stays')renderStays();
  if(t==='map')renderMap();
  if(t==='plan'){syncPlanChecks();updateProgress();}
  window.scrollTo({top:0});
}
document.querySelectorAll('nav.tabs button').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

// ================= INIT =================
function renderAll(){
  renderChips();renderPlan();renderEvents();renderToday();renderLists();renderBudget();renderInfo();updateProgress();updateCountdown();
  // Karte & Kalender werden beim Öffnen des jeweiligen Tabs gerendert (Leaflet braucht sichtbaren Container)
  const act=document.querySelector('nav.tabs button.active');
  if(act&&act.dataset.tab==='map')renderMap();
  if(act&&act.dataset.tab==='cal')renderCal();
}
if(state._theme==='dark'||(!state._theme&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)){
  document.body.dataset.theme='dark';document.getElementById('themeBtn').textContent='☀️';
}
renderAll();
</script>
